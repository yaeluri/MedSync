# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name 10.10.248.140 medsync medsync.cs.colman.ac.il;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 10.10.248.140 medsync medsync.cs.colman.ac.il;

    ssl_certificate     /etc/ssl/cs/CSB.crt;
    ssl_certificate_key /etc/ssl/cs/myserver.key;

    root /opt/medsync/client/dist;
    index index.html;

    # Proxy all /api/* requests to NestJS (trailing slash strips the /api prefix)
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        client_max_body_size 10m;
    }

    # SPA fallback — let React Router handle all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
